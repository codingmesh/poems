<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="42%" r="75%">
      <stop offset="0%" stop-color="#171021"/>
      <stop offset="55%" stop-color="#0a0712"/>
      <stop offset="100%" stop-color="#050308"/>
    </radialGradient>
    <radialGradient id="core" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="22%" stop-color="#ffd7ea"/>
      <stop offset="48%" stop-color="#ff7eb0"/>
      <stop offset="75%" stop-color="#ff7eb0" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#ff7eb0" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="gold" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="35%" stop-color="#ffe9a8"/>
      <stop offset="70%" stop-color="#ffd94d" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#ffd94d" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="cyan" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="35%" stop-color="#c9f7f2"/>
      <stop offset="70%" stop-color="#6fe8e0" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#6fe8e0" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="violet" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="40%" stop-color="#d6c9ff"/>
      <stop offset="70%" stop-color="#9090f0" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#9090f0" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- 深空底 -->
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>

  <!-- 背景星点 -->
  <g fill="#ffffff">
    <circle cx="74" cy="96" r="2.2" opacity="0.85"/>
    <circle cx="120" cy="64" r="1.4" opacity="0.55"/>
    <circle cx="418" cy="88" r="2.6" opacity="0.9"/>
    <circle cx="452" cy="150" r="1.5" opacity="0.5"/>
    <circle cx="64" cy="300" r="1.6" opacity="0.5"/>
    <circle cx="96" cy="420" r="2.4" opacity="0.8"/>
    <circle cx="438" cy="392" r="2" opacity="0.7"/>
    <circle cx="382" cy="448" r="1.4" opacity="0.5"/>
    <circle cx="212" cy="56" r="1.6" opacity="0.6"/>
    <circle cx="330" cy="52" r="1.3" opacity="0.45"/>
    <circle cx="52" cy="200" r="1.3" opacity="0.4"/>
    <circle cx="468" cy="270" r="1.7" opacity="0.55"/>
    <circle cx="160" cy="452" r="1.5" opacity="0.5"/>
  </g>
  <g>
    <circle cx="86" cy="150" r="3.2" fill="#cdefff" opacity="0.8"/>
    <circle cx="430" cy="330" r="3" fill="#fff3c9" opacity="0.75"/>
    <circle cx="270" cy="446" r="2.6" fill="#e8dcff" opacity="0.6"/>
  </g>

  <!-- 放射丝束（细线 + 微弯） -->
  <g fill="none" stroke-linecap="round">
    <!-- 主星 → 金星 -->
    <path d="M256 256 Q300 210 356 164" stroke="#ff9ec6" stroke-width="1.6" opacity="0.8"/>
    <path d="M256 256 Q312 224 362 176" stroke="#ff9ec6" stroke-width="1" opacity="0.45"/>
    <path d="M256 256 Q290 196 344 150" stroke="#ffb9d6" stroke-width="0.8" opacity="0.35"/>
    <!-- 主星 → 青星 -->
    <path d="M256 256 Q200 280 138 300" stroke="#ff9ec6" stroke-width="1.5" opacity="0.75"/>
    <path d="M256 256 Q196 262 130 288" stroke="#ffb9d6" stroke-width="0.9" opacity="0.4"/>
    <!-- 主星 → 紫星 -->
    <path d="M256 256 Q280 330 302 402" stroke="#ff9ec6" stroke-width="1.4" opacity="0.7"/>
    <path d="M256 256 Q262 336 286 408" stroke="#ffb9d6" stroke-width="0.8" opacity="0.35"/>
    <!-- 主星 → 白星(右上) -->
    <path d="M256 256 Q330 250 402 238" stroke="#ff9ec6" stroke-width="1.2" opacity="0.6"/>
    <!-- 主星 → 白星(左下) -->
    <path d="M256 256 Q206 330 158 386" stroke="#ff9ec6" stroke-width="1.2" opacity="0.55"/>
    <!-- 外围细芒 -->
    <g stroke="#ffb9d6">
      <path d="M256 256 Q216 176 196 96" stroke-width="0.8" opacity="0.35"/>
      <path d="M256 256 Q176 216 104 186" stroke-width="0.7" opacity="0.3"/>
      <path d="M256 256 Q340 300 430 330" stroke-width="0.7" opacity="0.3"/>
      <path d="M256 256 Q310 170 372 92" stroke-width="0.7" opacity="0.3"/>
      <path d="M256 256 Q160 300 78 356" stroke-width="0.7" opacity="0.28"/>
      <path d="M256 256 Q300 356 344 440" stroke-width="0.7" opacity="0.28"/>
      <path d="M256 256 Q220 340 190 442" stroke-width="0.6" opacity="0.25"/>
      <path d="M256 256 Q346 210 446 168" stroke-width="0.6" opacity="0.25"/>
      <path d="M256 256 Q230 140 240 60" stroke-width="0.6" opacity="0.25"/>
      <path d="M256 256 Q140 240 60 224" stroke-width="0.6" opacity="0.25"/>
    </g>
    <!-- 卫星之间的次级连线 -->
    <path d="M356 164 Q380 200 402 238" stroke="#e8c8a0" stroke-width="0.8" opacity="0.35"/>
    <path d="M138 300 Q146 344 158 386" stroke="#a0dcd8" stroke-width="0.8" opacity="0.35"/>
  </g>

  <!-- 卫星节点 -->
  <circle cx="356" cy="164" r="17" fill="url(#gold)"/>
  <circle cx="356" cy="164" r="4.5" fill="#fff7dd"/>
  <circle cx="138" cy="300" r="15" fill="url(#cyan)"/>
  <circle cx="138" cy="300" r="4" fill="#e6fffd"/>
  <circle cx="302" cy="402" r="13" fill="url(#violet)"/>
  <circle cx="302" cy="402" r="3.4" fill="#eceaff"/>
  <circle cx="402" cy="238" r="8" fill="#ffffff" opacity="0.9"/>
  <circle cx="158" cy="386" r="7" fill="#ffe9f2" opacity="0.85"/>

  <!-- 主星 -->
  <circle cx="256" cy="256" r="88" fill="url(#core)"/>
  <circle cx="256" cy="256" r="30" fill="#ffffff"/>
  <circle cx="256" cy="256" r="17" fill="#ffffff"/>
</svg>
