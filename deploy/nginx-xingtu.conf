server {
    listen 80;
    server_name _;  # 改成你的域名或服务器 IP

    root /var/www/xingtu;
    index index.html;

    # 单页应用回退
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 静态资源长缓存（Vite 产物带 hash，音频/图片单独放行）
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
    location ~* \.(mp3|png|jpg|svg|ico)$ {
        expires 7d;
        add_header Cache-Control "public";
    }

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1k;
}
